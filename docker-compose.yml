services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "${BACKEND_PORT:-5001}:${BACKEND_PORT:-5001}"
    env_file:
      - .env
    environment:
      - PORT=${BACKEND_PORT:-5001}
    volumes:
      # The backend clones repos into ../../repos relative to /app/routes, which resolves to /repos
      - repos_volume:/repos

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:5001}
    ports:
      - "${FRONTEND_PORT:-3000}:${FRONTEND_PORT:-3000}"
    env_file:
      - .env
    environment:
      - PORT=${FRONTEND_PORT:-3000}
    depends_on:
      - backend

volumes:
  repos_volume:
